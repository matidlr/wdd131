<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="author"
        content="Matías de la Rosa">

    <meta
        name="description"
        content="Product review form that allows users to rate products, select useful features, and submit feedback.">

    <title>Product Review Form</title>

    <link rel="stylesheet" href="styles/form.css">

    <script src="scripts/form.js" defer></script>
</head>

<body>

<header>
    <h1>Product Review Form</h1>
</header>

<main>

    <form action="review.html" method="get">

        <!-- Product Name -->

        <div class="form-group">
            <label for="product">Product Name *</label>

            <select id="product" name="product" required>
                <option value="" disabled selected>
                    Select a Product ...
                </option>
            </select>
        </div>

        <!-- Rating -->

        <div class="form-group">
            <p>Overall Rating *</p>

            <div class="rating">

                <div class="rating-input">
                    <label for="star1">★</label>
                    <input
                        type="radio"
                        id="star1"
                        name="rating"
                        value="1"
                        required>
                </div>

                <div class="rating-input">
                    <label for="star2">★★</label>
                    <input
                        type="radio"
                        id="star2"
                        name="rating"
                        value="2"
                        required>
                </div>

                <div class="rating-input">
                    <label for="star3">★★★</label>
                    <input
                        type="radio"
                        id="star3"
                        name="rating"
                        value="3"
                        required>
                </div>

                <div class="rating-input">
                    <label for="star4">★★★★</label>
                    <input
                        type="radio"
                        id="star4"
                        name="rating"
                        value="4"
                        required>
                </div>

                <div class="rating-input">
                    <label for="star5">★★★★★</label>
                    <input
                        type="radio"
                        id="star5"
                        name="rating"
                        value="5"
                        required>
                </div>

            </div>
        </div>

        <!-- Date -->

        <div class="form-group">
            <label for="installDate">
                Date of Installation *
            </label>

            <input
                type="date"
                id="installDate"
                name="installDate"
                required>
        </div>

        <!-- Features -->

        <div class="form-group">

            <p>
                Which features did you find useful in the product?
                <br>
                <em>(Check all that apply)</em>
            </p>

            <input
                type="checkbox"
                id="durability"
                name="features"
                value="Durability">

            <label for="durability">
                Durability
            </label>

            <input
                type="checkbox"
                id="ease"
                name="features"
                value="Ease of Use">

            <label for="ease">
                Ease of Use
            </label>

            <input
                type="checkbox"
                id="performance"
                name="features"
                value="Performance">

            <label for="performance">
                Performance
            </label>

            <input
                type="checkbox"
                id="design"
                name="features"
                value="Design">

            <label for="design">
                Design
            </label>

        </div>

        <!-- Written Review -->

        <div class="form-group">
            <label for="review">
                Written Review (Optional)
            </label>

            <textarea
                id="review"
                name="review"
                rows="5"></textarea>
        </div>

        <!-- User Name -->

        <div class="form-group">
            <label for="username">
                User Name (Optional)
            </label>

            <input
                type="text"
                id="username"
                name="username">
        </div>

        <!-- Submit -->

        <input
            type="submit"
            value="Post Review"
            class="submit-btn">

    </form>

</main>

<footer>
    <p>&copy; 2026 Matías de la Rosa | WDD 131</p>
</footer>

</body>
</html>
