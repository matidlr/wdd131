<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>

    <link rel="stylesheet" href="styles/form.css">

    <script src="scripts/form.js" defer></script>
</head>
<body>

<header>
    <h1>Product Review Form</h1>
</header>

<main>

<form action="review.html" method="get">

    <div class="form-group">
        <label for="product">Product Name *</label>

        <select id="product" name="product" required>
            <option value="" disabled selected>
                Select a Product ...
            </option>
        </select>
    </div>

    <div class="form-group">
        <p>Overall Rating *</p>

        <div class="rating">
            <div class="raiting-input">
                  <input type="radio" id="star1" name="rating" value="1" required>
                    <label for="star1">★</label>
            </div>

          
            <div class="raiting-input">
                <input type="radio" id="star2" name="rating" value="2">
                <label for="star2">★★</label>
            </div>
            
            <div class="raiting-input">
                <input type="radio" id="star3" name="rating" value="3">
                <label for="star3">★★★</label>
            </div>
            
            <div class="raiting-input">
                <input type="radio" id="star4" name="rating" value="4">
                <label for="star4">★★★★</label>
            </div>
            
            <div class="raiting-input">
                 <input type="radio" id="star5" name="rating" value="5">
                <label for="star5">★★★★★</label>
            </div>
           

        </div>
    </div>

    <div class="form-group">
        <label for="installDate">Date of Installation *</label>

        <input
            type="date"
            id="installDate"
            name="installDate"
            required>
    </div>

    <div class="form-group">
        <p>Useful Features</p>

        <label>
            <input type="checkbox"
                   id="durability"
                   name="features"
                   value="Durability">
            Durability
        </label>

        <label>
            <input type="checkbox"
                   id="ease"
                   name="features"
                   value="Ease of Use">
            Ease of Use
        </label>

        <label>
            <input type="checkbox"
                   id="performance"
                   name="features"
                   value="Performance">
            Performance
        </label>

        <label>
            <input type="checkbox"
                   id="design"
                   name="features"
                   value="Design">
            Design
        </label>
    </div>

    <div class="form-group">
        <label for="review">
            Written Review (Optional)
        </label>

        <textarea
            id="review"
            name="review"
            rows="5">
        </textarea>
    </div>

    <div class="form-group">
        <label for="username">
            User Name (Optional)
        </label>

        <input
            type="text"
            id="username"
            name="username">
    </div>

    <input
        type="submit"
        value="Submit Review"
        class="submit-btn">

</form>

</main>

<footer>
    <p>&copy; 2026 Matías de la Rosa | WDD 131</p>
</footer>

</body>
</html>
