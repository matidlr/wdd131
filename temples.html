<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="author" content="Matias de la Rosa">
    <meta name="description" content="Temple Album gallery page featuring beautiful temple images in a responsive mobile-first web design with navigation, CSS Grid layout, and interactive hamburger menu.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="temples.css">
    <link rel="stylesheet" href="temples-large.css">

    <script src="temples.js" defer></script>
</head>

<body>

    <header>
        <div class="header-container">
            <h2>Temple Album</h2>

            <button id="menu-button">&#9776;</button>

            <nav>
                <a href="#">Home</a>
                <a href="#">Old</a>
                <a href="#">New</a>
                <a href="#">Large</a>
                <a href="#">Small</a>
            </nav>
        </div>
    </header>

    <main>
        <h1>Temple Gallery</h1>

        <div class="gallery">

            <figure>
                <img src="salt-lake-temple.jpg" alt="Temple 1">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>

            <figure>
                <img src="rome-italy-temple.jpg" alt="Temple 2">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>

            <figure>
                <img src="tokyo-temple.jpg" alt="Temple 3">
                <figcaption>Tokyo Japan Temple</figcaption>
            </figure>

            <figure>
                <img src="paris-france-temple.jpg" alt="Temple 4">
                <figcaption>Paris France Temple</figcaption>
            </figure>

            <figure>
                <img src="mexico-temple.jpg" alt="Temple 5">
                <figcaption>Mexico City Temple</figcaption>
            </figure>

            <figure>
                <img src="manila-philippines-temple.jpg" alt="Temple 6">
                <figcaption>Manila Philippines Temple</figcaption>
            </figure>

            <figure>
                <img src="bs-as-temple.jpg" alt="Temple 7">
                <figcaption>Buenos Aires Temple</figcaption>
            </figure>

            <figure>
                <img src="s-diego-temple.jpg" alt="Temple 8">
                <figcaption>San Diego Temple</figcaption>
            </figure>

            <figure>
                <img src="provo-city-center-temple.jpg" alt="Temple 9">
                <figcaption>Provo City Center Temple</figcaption>
            </figure>

        </div>
    </main>

    <footer>
        <p>
            &copy; <span id="currentyear"></span> | Matias de la Rosa | Argentina
        </p>

        <p id="lastModified"></p>
    </footer>

</body>
</html>
